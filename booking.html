<!DOCTYPE html>
<html>
<head>
  <title>จองที่นั่ง - อีสานจุฬาฯ พาแลง</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    /* ✅ CSS อยู่ตรงนี้ครับ (คุมโทน ชมพู-ทอง-ครีม) */
    :root {
      --bg-color: #fdfaf0;
      --card-bg: rgba(255, 255, 255, 0.95);
      --available: #d68c2d;     /* สีทอง */
      --selected: #b52c58;      /* สีชมพูพาแลง */
      --booked: #e0e0e0;
      --text-main: #2d3436;
    }

    body {
      font-family: 'Kanit', sans-serif;
      background: linear-gradient(135deg, #fdfaf0 0%, #f7e9d7 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    /* จัดการผังที่นั่ง 3-เว้น-3 */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr) 0.5fr repeat(3, 1fr);
      gap: 12px 8px;
      margin-bottom: 25px;
    }

    .seat {
      aspect-ratio: 1/1;
      border-radius: 10px;
      border: 2px solid var(--available);
      background: white;
      color: var(--available);
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .seat.selected { background: var(--selected); border-color: var(--selected); color: white; }
    .seat.booked { background: var(--booked); border-color: var(--booked); color: #b2bec3; cursor: not-allowed; }
    .aisle { width: 100%; }
    .empty-space { visibility: hidden; }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }

    .main-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(to right, #b52c58, #d68c2d);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
    }

    /* ดีไซน์หน้าชำระเงินแบบที่คุณชอบ */
    .payment-summary { background: rgba(181, 44, 88, 0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: left; }
    .summary-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .total-price { border-top: 1px dashed #ccc; padding-top: 10px; font-weight: bold; color: var(--selected); font-size: 1.2rem; }
    .qr-section img { width: 180px; border-radius: 10px; margin: 15px 0; border: 1px solid #eee; }
    .custom-file-upload { display: block; padding: 10px; background: #f0f2f5; border: 1px dashed var(--selected); border-radius: 10px; cursor: pointer; margin-bottom: 15px; color: var(--selected); }
    input[type="file"] { display: none; }
  </style>
</head>
<body>

<div class="container">
  <div id="page1">
    <h2 style="color: var(--selected);">🎬 เลือกที่นั่งของคุณ</h2>
    
    <div class="grid">
      <button class="seat" onclick="changeColor(this)">A1</button>
      <button class="seat" onclick="changeColor(this)">A2</button>
      <button class="seat" onclick="changeColor(this)">A3</button>
      <div class="aisle"></div>
      <button class="seat" onclick="changeColor(this)">A4</button>
      <button class="seat" onclick="changeColor(this)">A5</button>
      <button class="seat" onclick="changeColor(this)">A6</button>

      <button class="seat" onclick="changeColor(this)">B1</button>
      <button class="seat" onclick="changeColor(this)">B2</button>
      <button class="seat" onclick="changeColor(this)">B3</button>
      <div class="aisle"></div>
      <button class="seat" onclick="changeColor(this)">B4</button>
      <button class="seat" onclick="changeColor(this)">B5</button>
      <button class="seat" onclick="changeColor(this)">B6</button>

      <button class="seat" onclick="changeColor(this)">C1</button>
      <button class="seat" onclick="changeColor(this)">C2</button>
      <button class="seat" onclick="changeColor(this)">C3</button>
      <div class="aisle"></div>
      <button class="seat" onclick="changeColor(this)">C4</button>
      <button class="seat" onclick="changeColor(this)">C5</button>
      <button class="seat" onclick="changeColor(this)">C6</button>

      <button class="seat" onclick="changeColor(this)">D1</button>
      <button class="seat" onclick="changeColor(this)">D2</button>
      <button class="seat" onclick="changeColor(this)">D3</button>
      <div class="aisle"></div>
      <div class="empty-space"></div>
      <div class="empty-space"></div>
      <div class="empty-space"></div>
    </div>

    <input type="text" id="customerName" placeholder="ชื่อผู้จองของคุณ">
    <input type="text" id="customerPhone" placeholder="เบอร์โทรศัพท์">
    <button class="main-btn" onclick="goToPayment()">จองตอนนี้ (699.-/ที่)</button>
  </div>

  <div id="page2" style="display:none;">
    <h2 style="color: var(--selected);">💳 ชำระเงิน</h2>
    <div class="payment-summary">
      <div class="summary-item"><span>ผู้จอง:</span> <span id="summaryName">-</span></div>
      <div class="summary-item"><span>เบอร์โทร:</span> <span id="summaryPhone">-</span></div>
      <div class="summary-item"><span>ที่นั่ง:</span> <span id="summarySeats">-</span></div>
      <div class="total-price"><span>ยอดรวม:</span> <span id="summaryTotal">0 บาท</span></div>
    </div>
    <div class="qr-section">
      <img src="qr.png" alt="QR Code">
      <p style="font-size: 0.9rem;">สแกนเพื่อโอนเงิน 699.-/ที่</p>
    </div>
    <label for="slip" class="custom-file-upload">📸 แนบสลิปที่นี่</label>
    <input type="file" id="slip" accept="image/*" onchange="updateFileName(this)">
    <p id="fileName" style="font-size:0.8rem; color:green;"></p>
    <button class="main-btn" onclick="finishPayment()">ยืนยันการชำระเงิน</button>
  </div>

  <div id="page3" style="display:none;">
    <h1 style="color: var(--selected);">🎉 จองสำเร็จแล้ว!</h1>
    <p>แล้วเจอกันในงานเด้อจ้า ❤️</p>
  </div>
</div>

<script type="module">
  // ... (ใส่ Firebase Config และ JavaScript เดิมที่คุณเคยรันได้เลยครับ) ...
</script>

</body>
</html>
