<!DOCTYPE html>
<html>
<head>
  <title>Admin - รายการจองที่นั่ง</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
    h1 { color: #333; }
    table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background-color: #4CAF50; color: white; }
    tr:nth-child(even) { background-color: #f2 f2 f2; }
    .btn-view { background: #2196F3; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    .btn-delete { background: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    img { max-width: 100%; display: none; margin-top: 10px; border: 2px solid #ddd; }
    #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); text-align:center; padding-top:50px; }
    #modal img { display:inline-block; max-width: 80%; max-height: 80%; }
  </style>
</head>
<body>

  <h1>📊 รายการจองที่นั่งทั้งหมด</h1>
  <p>ดูรายการจองและตรวจสอบสลิปการโอนเงิน</p>

  <table id="bookingTable">
    <thead>
      <tr>
        <th>ที่นั่ง</th>
        <th>ชื่อผู้จอง</th>
        <th>เวลาที่จอง</th>
        <th>หลักฐานการโอน</th>
        <th>จัดการ</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      </tbody>
  </table>

  <div id="modal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
    <p style="color:white;">คลิกเพื่อปิด</p>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  // ⚠️ อย่าลืมใช้ Config เดียวกับหน้าจองที่นั่งนะครับ
  const firebaseConfig = {
    apiKey: "AIzaSyD34kENWYBmQsjefAVNyisVq-U2V5ej8b4",
  authDomain: "seat-booking-757dc.firebaseapp.com",
  projectId: "seat-booking-757dc",
  storageBucket: "seat-booking-757dc.firebasestorage.app",
  messagingSenderId: "247801765305",
  appId: "1:247801765305:web:b301a58aee401195706a68",
  measurementId: "G-4WLFBTCGY5"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ดึงข้อมูลการจอง เรียงตามเวลาล่าสุด
  const q = query(collection(db, "bookings"), orderBy("timestamp", "desc"));

  onSnapshot(q, (snapshot) => {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = ""; // ล้างข้อมูลเก่าก่อนอัปเดตใหม่

    snapshot.forEach((snapshotDoc) => {
      const data = snapshotDoc.data();
      const row = document.createElement("tr");

      // แปลงเวลา Firebase Timestamp เป็นเวลาไทย
      const date = data.timestamp ? data.timestamp.toDate().toLocaleString('th-TH') : "-";

      row.innerHTML = `
        <td><strong>${data.seat}</strong></td>
        <td>${data.name}</td>
        <td>${date}</td>
        <td><button class="btn-view" onclick="viewSlip('${data.slipBase64}')">ดูสลิป</button></td>
        <td><button class="btn-delete" onclick="deleteBooking('${snapshotDoc.id}', '${data.seat}')">ลบ</button></td>
      `;
      tableBody.appendChild(row);
    });
  });

  // ฟังก์ชันดูรูปสลิป
  window.viewSlip = function(base64) {
    document.getElementById("modalImg").src = base64;
    document.getElementById("modal").style.display = "block";
  }

  // ฟังก์ชันลบข้อมูล (กรณีสลิปปลอม หรือจองผิด)
  window.deleteBooking = async function(id, seat) {
    if(confirm(`ยืนยันการลบการจองที่นั่ง ${seat} หรือไม่?`)) {
      await deleteDoc(doc(db, "bookings", id));
    }
  }
</script>

</body>
</html>
