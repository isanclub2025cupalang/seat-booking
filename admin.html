<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - ระบบจัดการที่นั่ง</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6c5ce7;
      --success: #00b894;
      --danger: #ff7675;
      --dark: #2d3436;
      --bg: #f0f2f5;
    }

    body {
      font-family: 'Kanit', sans-serif;
      background-color: var(--bg);
      margin: 0;
      padding: 20px;
    }

    .dashboard {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Header & Summary Cards */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      text-align: center;
    }

    .card h3 { margin: 0; color: #636e72; font-size: 0.9rem; }
    .card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 600; color: var(--primary); }

    /* Table Section */
    .table-container {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { text-align: left; padding: 15px; border-bottom: 2px solid #f0f2f5; color: #636e72; font-weight: 400; }
    td { padding: 15px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }

    .seat-badge {
      background: var(--primary);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: bold;
    }

    /* Buttons */
    .btn {
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Kanit', sans-serif;
      transition: 0.3s;
      font-size: 0.9rem;
    }
    .btn-view { background: rgba(108, 92, 231, 0.1); color: var(--primary); }
    .btn-view:hover { background: var(--primary); color: white; }
    .btn-delete { background: rgba(255, 118, 117, 0.1); color: var(--danger); margin-left: 5px; }
    .btn-delete:hover { background: var(--danger); color: white; }

    /* Modal */
    #modal {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.9); z-index: 1000; text-align:center; padding-top:40px;
    }
    #modal img { max-width: 90%; max-height: 80%; border-radius: 10px; }
    .close-modal { color: white; margin-top: 20px; cursor: pointer; display: block; }

    .search-box {
      padding: 10px 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
      width: 250px;
      font-family: 'Kanit';
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <div class="header">
      <h1>📊 ระบบหลังบ้าน</h1>
      <input type="text" id="searchInput" class="search-box" placeholder="ค้นหาชื่อผู้จอง..." onkeyup="filterTable()">
    </div>

    <div class="summary-grid">
      <div class="card">
        <h3>จำนวนที่นั่งที่จองแล้ว</h3>
        <p id="totalSeats">0</p>
      </div>
      <div class="card">
        <h3>ยอดรวมทั้งหมด (บาท)</h3>
        <p id="totalRevenue" style="color: var(--success);">0</p>
      </div>
    </div>

    <div class="table-container">
      <table id="bookingTable">
        <thead>
          <tr>
            <th>ที่นั่ง</th>
            <th>ชื่อผู้จอง</th>
            <th>เบอร์โทรผู้จอง</th>
            <th>ยอดชำระ</th>
            <th>เวลาที่จอง</th>
            <th>การจัดการ</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          </tbody>
      </table>
    </div>
  </div>

  <div id="modal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
    <span class="close-modal">คลิกตรงไหนก็ได้เพื่อปิด</span>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD34kENWYBmQsjefAVNyisVq-U2V5ej8b4",
  authDomain: "seat-booking-757dc.firebaseapp.com",
  projectId: "seat-booking-757dc",
  storageBucket: "seat-booking-757dc.firebasestorage.app",
  messagingSenderId: "247801765305",
  appId: "1:247801765305:web:b301a58aee401195706a68",
  measurementId: "G-4WLFBTCGY5"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const q = query(collection(db, "bookings"), orderBy("timestamp", "desc"));

  onSnapshot(q, (snapshot) => {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";
    
    let totalSeatsCount = 0;
    let totalMoney = 0;
    let uniqueBookings = new Set(); // ไว้สำหรับนับยอดเงินไม่ให้ซ้ำกรณี 1 บิลหลายที่นั่ง

    snapshot.forEach((snapshotDoc) => {
      const data = snapshotDoc.data();
      totalSeatsCount++;
      
      // คำนวณยอดเงิน (กรณีบันทึกแบบแยกที่นั่ง แต่ยอดรวมเดียวกัน)
      // เราจะบวกยอดเงินเฉพาะบิลที่ไม่ซ้ำกัน หรือถ้าคุณบันทึกแยกยอด ให้ใช้ logic อื่น
      // ในที่นี้สมมติบวกตามจำนวนที่นั่ง x 699 เพื่อความง่าย
      totalMoney += 699;

      const date = data.timestamp ? data.timestamp.toDate().toLocaleString('th-TH') : "-";
      
      const row = document.createElement("tr");
      row.innerHTML = `
        <td><span class="seat-badge">${data.seat}</span></td>
        <td><strong>${data.name}</strong></td>
        <td>${(699).toLocaleString()} ฿</td>
        <td style="font-size: 0.85rem; color: #636e72;">${date}</td>
        <td>
          <button class="btn btn-view" onclick="viewSlip('${data.slipBase64}')">ดูสลิป</button>
          <button class="btn btn-delete" onclick="deleteBooking('${snapshotDoc.id}', '${data.seat}')">ลบ</button>
        </td>
      `;
      tableBody.appendChild(row);
    });

    document.getElementById("totalSeats").innerText = totalSeatsCount;
    document.getElementById("totalRevenue").innerText = totalMoney.toLocaleString();
  });

  window.viewSlip = function(base64) {
    document.getElementById("modalImg").src = base64;
    document.getElementById("modal").style.display = "block";
  }

  window.deleteBooking = async function(id, seat) {
    if(confirm(`ลบการจองที่นั่ง ${seat} หรือไม่? ที่นั่งจะกลับมาว่างทันที`)) {
      await deleteDoc(doc(db, "bookings", id));
    }
  }

  // ฟังก์ชันค้นหาในตาราง
  window.filterTable = function() {
    const input = document.getElementById("searchInput");
    const filter = input.value.toUpperCase();
    const tr = document.getElementById("tableBody").getElementsByTagName("tr");

    for (let i = 0; i < tr.length; i++) {
      let td = tr[i].getElementsByTagName("td")[1]; // ช่องชื่อผู้จอง
      if (td) {
        let txtValue = td.textContent || td.innerText;
        tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
      }
    }
  }
</script>
</body>
</html>
