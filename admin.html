<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin - รายชื่อผู้จอง</title>
</head>
<body>

<h1>📋 รายชื่อผู้จองที่นั่ง</h1>
<ul id="list"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyD34kENWYBmQsjefAVNyisVq-U2V5ej8b4",
  authDomain: "seat-booking-757dc.firebaseapp.com",
  projectId: "seat-booking-757dc",
  storageBucket: "seat-booking-757dc.firebasestorage.app",
  messagingSenderId: "247801765305",
  appId: "1:247801765305:web:b301a58aee401195706a68",
  measurementId: "G-4WLFBTCGY5"
};
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const list = document.getElementById("list");

  async function loadData() {
    const querySnapshot = await getDocs(collection(db, "bookings"));
    querySnapshot.forEach((doc) => {
      const data = doc.data();
      const li = document.createElement("li");
      li.textContent = `ชื่อ: ${data.name} | ที่นั่ง: ${data.seat}`;
      list.appendChild(li);
    });
  }

  loadData();
</script>

</body>
</html>
