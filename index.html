<!DOCTYPE html>
<html>
<head>
  <title>Seat Booking</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 70px);
      gap: 15px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .seat {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      border: none;
      background-color: lightgreen;
      cursor: pointer;
      font-weight: bold;
    }

    .selected {
      background-color: orange;
    }

    .booked {
      background-color: red;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<!-- ✅ PAGE 1 -->
<div id="page1">

  <h1>เลือกที่นั่งที่ต้องการ</h1>

  <div class="grid">

    <button class="seat" onclick="changeColor(this)">A1</button>
    <button class="seat" onclick="changeColor(this)">A2</button>
    <button class="seat" onclick="changeColor(this)">A3</button>
    <button class="seat" onclick="changeColor(this)">A4</button>

    <button class="seat" onclick="changeColor(this)">B1</button>
    <button class="seat" onclick="changeColor(this)">B2</button>
    <button class="seat" onclick="changeColor(this)">B3</button>
    <button class="seat" onclick="changeColor(this)">B4</button>

    <button class="seat" onclick="changeColor(this)">C1</button>
    <button class="seat" onclick="changeColor(this)">C2</button>
    <button class="seat" onclick="changeColor(this)">C3</button>
    <button class="seat" onclick="changeColor(this)">C4</button>

    <button class="seat" onclick="changeColor(this)">D1</button>
    <button class="seat" onclick="changeColor(this)">D2</button>
    <button class="seat" onclick="changeColor(this)">D3</button>
    <button class="seat" onclick="changeColor(this)">D4</button>

    <button class="seat" onclick="changeColor(this)">E1</button>
    <button class="seat" onclick="changeColor(this)">E2</button>
    <button class="seat" onclick="changeColor(this)">E3</button>
    <button class="seat" onclick="changeColor(this)">E4</button>

  </div>

  <label>ชื่อผู้จอง:</label>
  <input type="text" id="customerName" placeholder="กรอกชื่อที่นี่">
  <br><br>
  <button onclick="goToPayment()">จอง</button>

</div>


<!-- ✅ PAGE 2 -->
<div id="page2" style="display:none; text-align:center;">

  <h2>💳 ชำระเงิน</h2>
  <p>สแกน QR เพื่อโอนเงิน</p>

  <img src="qr.png" width="250"><br><br>

  <input type="file" id="slip" accept="image/*"><br><br>

  <button onclick="finishPayment()">เสร็จสิ้น</button>

</div>


<!-- ✅ PAGE 3 -->
<div id="page3" style="display:none; text-align:center;">

  <h1>🎉 ขอบคุณที่จองพาแลงกับเฮาเด้อจ้า ❤️</h1>

</div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    onSnapshot, 
    query 
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD34kENWYBmQsjefAVNyisVq-U2V5ej8b4",
  authDomain: "seat-booking-757dc.firebaseapp.com",
  projectId: "seat-booking-757dc",
  storageBucket: "seat-booking-757dc.firebasestorage.app",
  messagingSenderId: "247801765305",
  appId: "1:247801765305:web:b301a58aee401195706a68",
  measurementId: "G-4WLFBTCGY5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let selectedSeatsForPayment = [];
  let alreadyBookedSeats = [];

  // 1. ดึงข้อมูลที่นั่งที่จองแล้วแบบ Real-time
  const q = query(collection(db, "bookings"));
  onSnapshot(q, (snapshot) => {
    alreadyBookedSeats = snapshot.docs.map(doc => doc.data().seat);
    updateSeatUI();
  });

  function updateSeatUI() {
    document.querySelectorAll(".seat").forEach(btn => {
      if (alreadyBookedSeats.includes(btn.innerText)) {
        btn.classList.add("booked");
        btn.classList.remove("selected");
        btn.disabled = true;
      }
    });
  }

  // 2. ฟังก์ชันบีบอัดรูปภาพ (Image Compression)
  async function compressImage(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800; // ปรับความกว้างสูงสุดเป็น 800px
          let width = img.width;
          let height = img.height;

          if (width > MAX_WIDTH) {
            height *= MAX_WIDTH / width;
            width = MAX_WIDTH;
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          // บีบอัดคุณภาพเหลือ 70% (0.7)
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          resolve(dataUrl);
        };
      };
    });
  }

  window.changeColor = function(button) {
    if (button.classList.contains("booked")) return;
    button.classList.toggle("selected");
  };

  window.goToPayment = function() {
    const name = document.getElementById("customerName").value.trim();
    const selectedSeats = document.querySelectorAll(".selected");

    if (!name || selectedSeats.length === 0) {
      alert("กรุณากรอกชื่อและเลือกที่นั่งให้เรียบร้อยจ้า");
      return;
    }

    selectedSeatsForPayment = Array.from(selectedSeats).map(s => s.innerText);
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
  };

  window.finishPayment = async function() {
    const name = document.getElementById("customerName").value.trim();
    const slipFile = document.getElementById("slip").files[0];

    if (!slipFile) {
      alert("รบกวนแนบสลิปเพื่อยืนยันการโอนเงินด้วยน้า");
      return;
    }

    // แสดงสถานะกำลังโหลด (Optionally)
    const btn = document.querySelector("#page2 button");
    btn.disabled = true;
    btn.innerText = "กำลังบันทึกข้อมูล...";

    try {
      // บีบอัดรูปก่อนส่ง
      const compressedBase64 = await compressImage(slipFile);

      for (const seatNumber of selectedSeatsForPayment) {
        await addDoc(collection(db, "bookings"), {
          name: name,
          seat: seatNumber,
          slipBase64: compressedBase64,
          timestamp: new Date()
        });
      }

      document.getElementById("page2").style.display = "none";
      document.getElementById("page3").style.display = "block";
    } catch (error) {
      console.error(error);
      alert("เกิดข้อผิดพลาด ลองใหม่อีกครั้งนะ");
      btn.disabled = false;
      btn.innerText = "เสร็จสิ้น";
    }
  };
</script>

</body>
</html>
