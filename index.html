<<!DOCTYPE html>
<html>
<head>
  <title>Seat Booking</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 70px);
      gap: 15px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .seat {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      border: none;
      background-color: lightgreen;
      cursor: pointer;
      font-weight: bold;
    }

    .selected {
      background-color: orange;
    }

    .booked {
      background-color: red;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <h1>เลือกที่นั่งที่ต้องการ</h1>

  <div class="grid">

    <!-- แถว A -->
    <button class="seat" onclick="changeColor(this)">A1</button>
    <button class="seat" onclick="changeColor(this)">A2</button>
    <button class="seat" onclick="changeColor(this)">A3</button>
    <button class="seat" onclick="changeColor(this)">A4</button>

    <!-- แถว B -->
    <button class="seat" onclick="changeColor(this)">B1</button>
    <button class="seat" onclick="changeColor(this)">B2</button>
    <button class="seat" onclick="changeColor(this)">B3</button>
    <button class="seat" onclick="changeColor(this)">B4</button>

    <!-- แถว C -->
    <button class="seat" onclick="changeColor(this)">C1</button>
    <button class="seat" onclick="changeColor(this)">C2</button>
    <button class="seat" onclick="changeColor(this)">C3</button>
    <button class="seat" onclick="changeColor(this)">C4</button>

    <!-- แถว D -->
    <button class="seat" onclick="changeColor(this)">D1</button>
    <button class="seat" onclick="changeColor(this)">D2</button>
    <button class="seat" onclick="changeColor(this)">D3</button>
    <button class="seat" onclick="changeColor(this)">D4</button>

    <!-- แถว E -->
    <button class="seat" onclick="changeColor(this)">E1</button>
    <button class="seat" onclick="changeColor(this)">E2</button>
    <button class="seat" onclick="changeColor(this)">E3</button>
    <button class="seat" onclick="changeColor(this)">E4</button>

  </div>
<br><br>
<label>ชื่อผู้จอง:</label>
<input type="text" id="customerName" placeholder="กรอกชื่อที่นี่">
<br><br>
<button onclick="confirmBooking()">ยืนยันการจอง</button>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD34kENWYBmQsjefAVNyisVq-U2V5ej8b4",
    authDomain: "seat-booking-757dc.firebaseapp.com",
    projectId: "seat-booking-757dc",
    storageBucket: "seat-booking-757dc.firebasestorage.app",
    messagingSenderId: "247801765305",
    appId: "1:247801765305:web:b301a58aee401195706a68"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.changeColor = function(button) {
    if (button.classList.contains("booked")) return;
    button.classList.toggle("selected");
  };

  window.confirmBooking = async function() {
    const name = document.getElementById("customerName").value.trim();
    const selectedSeats = document.querySelectorAll(".selected");

    if (name === "") {
      alert("กรุณากรอกชื่อผู้จองก่อน");
      return;
    }

    if (selectedSeats.length === 0) {
      alert("กรุณาเลือกที่นั่งก่อน");
      return;
    }

    for (const seat of selectedSeats) {
      await addDoc(collection(db, "bookings"), {
        name: name,
        seat: seat.innerText,
        timestamp: new Date()
      });

      seat.classList.remove("selected");
      seat.classList.add("booked");
      seat.title = "จองโดย: " + name;
    }

    alert("บันทึกลงฐานข้อมูลกลางแล้ว!");
    document.getElementById("customerName").value = "";
  };

  async function loadBookings() {
    const querySnapshot = await getDocs(collection(db, "bookings"));
    querySnapshot.forEach((doc) => {
      const data = doc.data();
      const seats = document.querySelectorAll(".seat");

      seats.forEach(seat => {
        if (seat.innerText === data.seat) {
          seat.classList.add("booked");
          seat.title = "จองโดย: " + data.name;
        }
      });
    });
  }

  loadBookings();
</script>

</body>
</html>
