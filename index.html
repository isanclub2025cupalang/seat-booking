<!DOCTYPE html>
<html>
<head>
  <title>Seat Booking</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 70px);
      gap: 15px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .seat {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      border: none;
      background-color: lightgreen;
      cursor: pointer;
      font-weight: bold;
    }

    .selected {
      background-color: orange;
    }

    .booked {
      background-color: red;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<!-- ✅ PAGE 1 -->
<div id="page1">

  <h1>เลือกที่นั่งที่ต้องการ</h1>

  <div class="grid">

    <button class="seat" onclick="changeColor(this)">A1</button>
    <button class="seat" onclick="changeColor(this)">A2</button>
    <button class="seat" onclick="changeColor(this)">A3</button>
    <button class="seat" onclick="changeColor(this)">A4</button>

    <button class="seat" onclick="changeColor(this)">B1</button>
    <button class="seat" onclick="changeColor(this)">B2</button>
    <button class="seat" onclick="changeColor(this)">B3</button>
    <button class="seat" onclick="changeColor(this)">B4</button>

    <button class="seat" onclick="changeColor(this)">C1</button>
    <button class="seat" onclick="changeColor(this)">C2</button>
    <button class="seat" onclick="changeColor(this)">C3</button>
    <button class="seat" onclick="changeColor(this)">C4</button>

    <button class="seat" onclick="changeColor(this)">D1</button>
    <button class="seat" onclick="changeColor(this)">D2</button>
    <button class="seat" onclick="changeColor(this)">D3</button>
    <button class="seat" onclick="changeColor(this)">D4</button>

    <button class="seat" onclick="changeColor(this)">E1</button>
    <button class="seat" onclick="changeColor(this)">E2</button>
    <button class="seat" onclick="changeColor(this)">E3</button>
    <button class="seat" onclick="changeColor(this)">E4</button>

  </div>

  <label>ชื่อผู้จอง:</label>
  <input type="text" id="customerName" placeholder="กรอกชื่อที่นี่">
  <br><br>
  <button onclick="goToPayment()">จอง</button>

</div>


<!-- ✅ PAGE 2 -->
<div id="page2" style="display:none; text-align:center;">

  <h2>💳 ชำระเงิน</h2>
  <p>สแกน QR เพื่อโอนเงิน</p>

  <img src="qr.png" width="250"><br><br>

  <input type="file" id="slip" accept="image/*"><br><br>

  <button onclick="finishPayment()">เสร็จสิ้น</button>

</div>


<!-- ✅ PAGE 3 -->
<div id="page3" style="display:none; text-align:center;">

  <h1>🎉 ขอบคุณที่จองพาแลงกับเฮาเด้อจ้า ❤️</h1>

</div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "seat-booking-757dc.firebaseapp.com",
    projectId: "seat-booking-757dc",
    storageBucket: "seat-booking-757dc.firebasestorage.app",
    messagingSenderId: "247801765305",
    appId: "1:247801765305:web:b301a58aee401195706a68"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let selectedSeatsForPayment = [];

  window.changeColor = function(button) {
    if (button.classList.contains("booked")) return;
    button.classList.toggle("selected");
  };

  window.goToPayment = function() {

    const name = document.getElementById("customerName").value.trim();
    const selectedSeats = document.querySelectorAll(".selected");

    if (name === "") {
      alert("กรุณากรอกชื่อก่อน");
      return;
    }

    if (selectedSeats.length === 0) {
      alert("กรุณาเลือกที่นั่งก่อน");
      return;
    }

    selectedSeatsForPayment = [];
    selectedSeats.forEach(seat => {
      selectedSeatsForPayment.push(seat.innerText);
    });

    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
  };

  window.finishPayment = async function() {

    const name = document.getElementById("customerName").value.trim();
    const slipFile = document.getElementById("slip").files[0];

    if (!slipFile) {
      alert("กรุณาแนบสลิปก่อน");
      return;
    }

    const reader = new FileReader();

    reader.onload = async function(e) {

      const base64Slip = e.target.result;

      for (const seatNumber of selectedSeatsForPayment) {

        await addDoc(collection(db, "bookings"), {
          name: name,
          seat: seatNumber,
          slipBase64: base64Slip,
          timestamp: new Date()
        });
      }

      document.getElementById("page2").style.display = "none";
      document.getElementById("page3").style.display = "block";
    };

    reader.readAsDataURL(slipFile);
  };
</script>

</body>
</html>
